name: babivoyage
description: "BabiVoyage Lite - Flutter mobile app"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/images/welcome_bg.png
    - assets/images/dest_paris.jpg
    - assets/images/dest_tokyo.jpg
    - assets/images/dest_miami.jpg
    - assets/images/dest_rome.jpg
    - assets/images/airplane_top.jpg
